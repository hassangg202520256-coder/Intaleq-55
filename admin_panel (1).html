<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>إنطلق — لوحة الإدارة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:      #060D1A;
      --primary-mid:  #0B1A2E;
      --accent:       #1351A8;
      --accent-light: #1A6FD4;
      --sky:          #3B9EE8;
      --glow:         #7EC8F7;
      --white:        #FFFFFF;
      --card-bg:      rgba(255,255,255,0.04);
      --border:       rgba(59,158,232,0.22);
      --text-muted:   rgba(255,255,255,0.52);
      --shadow-blue:  0 8px 40px rgba(19,81,168,0.38);
      --green:        #22c55e;
      --green-dim:    rgba(34,197,94,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--primary);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
      max-width: 100vw;
    }

    /* ─── PAGES ─────────────────────────────────────── */
    .page { display: none; min-height: 100vh; }
    .page.active { display: flex; flex-direction: column; }

    /* ─── NAVBAR ─────────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 66px;
      background: rgba(6,13,26,0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: 'Almarai', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      background: linear-gradient(135deg, var(--white) 20%, var(--sky));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    .nav-links { display: flex; gap: 0.4rem; align-items: center; }

    .nav-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.72);
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 0.93rem;
      font-weight: 500;
      padding: 0.42rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn:hover { color: var(--white); background: var(--card-bg); }
    .nav-btn.active-nav {
      color: var(--sky);
      font-weight: 600;
      border: 1.5px solid rgba(59,158,232,0.55);
      background: rgba(59,158,232,0.08);
      border-radius: 8px;
    }

    .nav-cta {
      background: #b03020;
      color: var(--white) !important;
      border-radius: 6px;
      padding: 0.26rem 0.72rem;
      font-weight: 700;
      font-size: 0.76rem !important;
      transition: background 0.2s, transform 0.15s;
    }
    .nav-cta:hover { background: #d9432f !important; transform: translateY(-1px); }

    /* ─── BG MESH ────────────────────────────────────── */
    .mesh {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .mesh::before {
      content: '';
      position: absolute;
      width: 650px; height: 650px;
      background: radial-gradient(circle, rgba(19,81,168,0.16) 0%, transparent 70%);
      top: -180px; right: -180px;
      animation: float1 13s ease-in-out infinite;
    }
    .mesh::after {
      content: '';
      position: absolute;
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(59,158,232,0.10) 0%, transparent 70%);
      bottom: -80px; left: -80px;
      animation: float2 16s ease-in-out infinite;
    }
    @keyframes float1 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(35px,55px) scale(1.07); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-28px,-45px) scale(1.05); }
    }

    /* ─── LOGIN PAGE ─────────────────────────────────── */
    #loginPage {
      justify-content: center;
      align-items: center;
      background: linear-gradient(160deg, var(--primary) 0%, var(--primary-mid) 60%, #040A14 100%);
      position: relative;
    }

    .login-card {
      position: relative;
      z-index: 1;
      background: rgba(11,26,46,0.78);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 3rem 2.8rem;
      width: 100%;
      max-width: 430px;
      box-shadow: var(--shadow-blue), inset 0 1px 0 rgba(255,255,255,0.05);
      backdrop-filter: blur(22px);
      animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-brand { text-align: center; margin-bottom: 2rem; }
    .login-brand-name {
      font-family: 'Almarai', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--white), var(--sky));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-sub {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-top: 0.35rem;
      line-height: 1.6;
    }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      font-size: 0.86rem;
      font-weight: 600;
      color: rgba(255,255,255,0.78);
      margin-bottom: 0.48rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(59,158,232,0.2);
      border-radius: 10px;
      color: var(--white);
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 0.94rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      direction: rtl;
    }
    .form-group input:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(59,158,232,0.14);
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.28); }

    .btn-primary {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--accent), var(--sky));
      border: none;
      border-radius: 11px;
      color: var(--white);
      font-family: 'Almarai', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(19,81,168,0.42);
      margin-top: 0.5rem;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(19,81,168,0.58);
    }
    .btn-primary:active { transform: translateY(0); }

    .auth-error {
      color: #f87171;
      font-size: 0.83rem;
      margin-bottom: 0.6rem;
      text-align: center;
      min-height: 1.2rem;
    }

    /* Google sign-in button */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.75rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 11px;
      color: var(--white);
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 0.93rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      margin-top: 0.5rem;
    }
    .btn-google:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.28); }
    .btn-google img { width: 20px; height: 20px; }

    .auth-divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      margin: 0.9rem 0;
      position: relative;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after  { right: 0; }

    .login-footer {
      text-align: center;
      margin-top: 1.4rem;
      font-size: 0.87rem;
      color: var(--text-muted);
    }
    .login-footer a {
      color: var(--sky);
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
    }
    .login-footer a:hover { text-decoration: underline; }

    /* ─── FIREBASE AUTH STATES ─────────────────────── */
    .auth-loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--primary);
      font-family: 'Almarai', sans-serif; font-size: 1.2rem;
      color: var(--sky); flex-direction: column; gap: 1rem;
    }
    .auth-spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(59,158,232,0.2);
      border-top-color: var(--sky);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── ADMIN PAGE ─────────────────────────────────── */
    #adminPage { background: var(--primary); }

    .admin-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
      position: relative;
      z-index: 1;
    }

    .admin-header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeUp 0.4s both;
    }
    .admin-header h1 {
      font-family: 'Almarai', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
      margin-bottom: 0.4rem;
    }
    .admin-header p { color: var(--text-muted); font-size: 0.93rem; }

    .admin-stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
      animation: fadeUp 0.4s 0.05s both;
    }
    @media (max-width: 600px) { .admin-stats-row { grid-template-columns: 1fr; } }

    .admin-stat-card {
      background: rgba(11,26,46,0.7);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.2rem 1.5rem;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .admin-stat-num {
      font-family: 'Almarai', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--sky), var(--glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .admin-stat-num.gold {
      background: linear-gradient(135deg, #f0c040, #ffe87a);
      -webkit-background-clip: text;
      background-clip: text;
    }
    .admin-stat-label { font-size: 0.82rem; color: var(--text-muted); margin-top: 0.2rem; }

    .admin-section {
      background: rgba(11,26,46,0.62);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.6rem 1.8rem;
      margin-bottom: 1.4rem;
      backdrop-filter: blur(10px);
      animation: fadeUp 0.5s 0.1s both;
    }
    .admin-section-title {
      font-family: 'Almarai', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--sky);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      justify-content: space-between;
    }

    .admin-search-box {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(59,158,232,0.2);
      border-radius: 10px;
      padding: 0 0.8rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .admin-search-box:focus-within { border-color: var(--sky); }
    .admin-search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--white);
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 0.9rem;
      padding: 0.65rem 0.3rem;
      direction: rtl;
    }
    .admin-search-box input::placeholder { color: rgba(255,255,255,0.28); }

    .users-table {
      width: 100%;
      border-collapse: collapse;
    }
    .users-table th {
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0.6rem 0.8rem;
      text-align: right;
      border-bottom: 1px solid rgba(59,158,232,0.12);
    }
    .users-table td {
      padding: 0.85rem 0.8rem;
      border-bottom: 1px solid rgba(59,158,232,0.07);
      vertical-align: middle;
    }
    .users-table tr:last-child td { border-bottom: none; }
    .users-table tr:hover td { background: rgba(59,158,232,0.04); }

    .user-email-cell {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--sky));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      color: var(--white);
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .premium-toggle-wrap { display: flex; align-items: center; gap: 0.6rem; }
    .premium-badge-admin {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(240,192,64,0.12);
      border: 1px solid rgba(240,192,64,0.4);
      color: #f0c040;
      border-radius: 20px;
      padding: 0.22rem 0.7rem;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .free-badge-admin {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.45);
      border-radius: 20px;
      padding: 0.22rem 0.7rem;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .toggle-premium-btn {
      background: none;
      border: 1.5px solid rgba(59,158,232,0.3);
      border-radius: 8px;
      color: var(--sky);
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .toggle-premium-btn:hover { background: rgba(59,158,232,0.12); border-color: var(--sky); }
    .toggle-premium-btn.make-free {
      border-color: rgba(239,68,68,0.35);
      color: #f87171;
    }
    .toggle-premium-btn.make-free:hover { background: rgba(239,68,68,0.1); border-color: #ef4444; }

    .admin-refresh-btn {
      background: rgba(59,158,232,0.1);
      border: 1px solid rgba(59,158,232,0.3);
      border-radius: 8px;
      color: var(--sky);
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.35rem 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .admin-refresh-btn:hover { background: rgba(59,158,232,0.2); }

    .admin-empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .admin-empty span { font-size: 2.5rem; display: block; margin-bottom: 0.7rem; }

    .admin-loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .admin-toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: linear-gradient(135deg, #1a4a1a, #15803d);
      border: 1.5px solid #22c55e;
      border-radius: 12px;
      padding: 0.75rem 1.4rem;
      color: #fff;
      font-family: 'Almarai', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      z-index: 9999;
      box-shadow: 0 8px 32px rgba(34,197,94,0.35);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
    }
    .admin-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .admin-access-denied {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
      position: relative; z-index: 1;
    }
    .admin-access-denied h2 {
      font-family: 'Almarai', sans-serif;
      font-size: 1.5rem;
      color: #f87171;
      margin: 1rem 0 0.5rem;
    }

    .btn-hero {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.88rem 2rem;
      border-radius: 12px;
      font-family: 'Almarai', sans-serif;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      border: none;
    }
    .btn-hero-main {
      background: linear-gradient(135deg, var(--accent), var(--sky));
      color: var(--white);
      box-shadow: 0 6px 24px rgba(19,81,168,0.45);
    }
    .btn-hero-main:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(19,81,168,0.62);
    }

    @media (max-width: 600px) {
      nav { padding: 0 1rem; gap: 0.3rem; }
      .nav-links { gap: 0.2rem; flex-wrap: nowrap; overflow-x: auto; }
      .nav-btn { font-size: 0.8rem !important; padding: 0.35rem 0.6rem; }
      .admin-container { padding: 1.5rem 1rem 4rem; }
    }
  </style>
</head>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword,
           signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged,
           browserSessionPersistence, setPersistence }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, collection,
           getDocs, query, orderBy, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAKbKD9ZzYdaX4EHq8d50SYAqZNhXsz2Zg",
    authDomain: "intaleq-b4daa.firebaseapp.com",
    projectId: "intaleq-b4daa",
    storageBucket: "intaleq-b4daa.firebasestorage.app",
    messagingSenderId: "259617527100",
    appId: "1:259617527100:web:19625fb965453f4522ba39",
    measurementId: "G-RL326EVDTT"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const db       = getFirestore(app);
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' });
  await setPersistence(auth, browserSessionPersistence);

  window._fbAuth      = auth;
  window._fbDb        = db;
  window._fbProvider  = provider;
  window._fbSignIn    = signInWithEmailAndPassword;
  window._fbGoogleIn  = signInWithPopup;
  window._fbSignOut   = signOut;
  window._fbOnAuth    = onAuthStateChanged;
  window._fbDoc       = doc;
  window._fbGetDoc    = getDoc;
  window._fbSetDoc    = setDoc;
  window._fbCollection= collection;
  window._fbGetDocs   = getDocs;
  window._fbQuery     = query;
  window._fbOrderBy   = orderBy;
  window._fbServerTs  = serverTimestamp;

  window._firebaseReady = true;
  Promise.resolve().then(() => document.dispatchEvent(new Event('firebase-ready')));
</script>

<!-- Auth Loading Screen -->
<div id="authLoadingScreen" style="position:fixed;inset:0;z-index:9999;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;">
  <div style="font-family:'Almarai',sans-serif;font-size:1.8rem;font-weight:800;color:var(--sky);">إنطلق 🛡️</div>
  <div class="auth-spinner"></div>
  <div style="font-family:'Almarai',sans-serif;color:var(--text-muted);font-size:0.88rem;">جاري التحقق من الصلاحيات...</div>
</div>

<div class="mesh"></div>

<!-- ══════════════════════════════════════
     LOGIN PAGE
══════════════════════════════════════ -->
<div id="loginPage" class="page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-name">إنطلق 🛡️</div>
      <div class="login-sub">تسجيل دخول المشرفين فقط</div>
    </div>

    <div id="loginForm">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" placeholder="admin@email.com" id="emailInput">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" placeholder="••••••••" id="passwordInput">
      </div>
      <div id="authError" class="auth-error"></div>
      <button class="btn-primary" id="loginBtn">تسجيل الدخول</button>
      <div class="auth-divider">أو</div>
      <button class="btn-google" id="googleLoginBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        تسجيل الدخول بـ Google
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     ADMIN PAGE
══════════════════════════════════════ -->
<div id="adminPage" class="page">
  <div class="mesh"></div>
  <nav>
    <div class="nav-logo">إنطلق 🛡️</div>
    <div class="nav-links">
      <button class="nav-btn active-nav">لوحة الإدارة</button>
      <button class="nav-btn nav-cta" onclick="fbLogout()">خروج</button>
    </div>
  </nav>

  <div id="adminContent" style="display:none;">
    <div class="admin-container">
      <div class="admin-header">
        <h1>🛡️ لوحة الإدارة</h1>
        <p>إدارة المستخدمين وصلاحيات Premium</p>
      </div>

      <!-- Stats -->
      <div class="admin-stats-row">
        <div class="admin-stat-card">
          <div class="admin-stat-num" id="admin-total-count">—</div>
          <div class="admin-stat-label">إجمالي المستخدمين</div>
        </div>
        <div class="admin-stat-card">
          <div class="admin-stat-num gold" id="admin-premium-count">—</div>
          <div class="admin-stat-label">مستخدمو Premium 👑</div>
        </div>
        <div class="admin-stat-card">
          <div class="admin-stat-num" id="admin-free-count">—</div>
          <div class="admin-stat-label">مستخدمون مجاني</div>
        </div>
      </div>

      <!-- Users Table -->
      <div class="admin-section">
        <div class="admin-section-title">
          <span>👥 قائمة المستخدمين</span>
          <button class="admin-refresh-btn" onclick="loadAdminUsers()">🔄 تحديث</button>
        </div>

        <div class="admin-search-box">
          <span style="color:var(--text-muted);margin-left:0.5rem;">🔍</span>
          <input type="text" placeholder="ابحث بالبريد الإلكتروني أو الاسم..." id="adminSearchInput" oninput="filterAdminUsers(this.value)" />
        </div>

        <div id="adminUsersContainer">
          <div class="admin-loading">⏳ جاري تحميل المستخدمين...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="adminAccessDenied" style="display:none;" class="admin-access-denied">
    <div style="font-size:4rem;">🚫</div>
    <h2>غير مصرح بالدخول</h2>
    <p>هذه الصفحة متاحة للمشرفين فقط</p>
    <button class="btn-hero btn-hero-main" style="margin-top:1.5rem;" onclick="fbLogout()">تسجيل الخروج</button>
  </div>
</div>

<div class="admin-toast" id="adminToast">✅ <span id="adminToastMsg"></span></div>

<script>
  // ══════════════════════════════════════════════════════════
  // ADMIN SYSTEM
  // ══════════════════════════════════════════════════════════

  // ─── Admin Email List ──────────────────────────────────
  const ADMIN_UIDS = ['EsGQrh6a4Eemm4ZFIf9mCm2B2Zp2'];

  function isAdminUser(user) {
    const u = user || (window._fbAuth && window._fbAuth.currentUser);
    if (!u) return false;
    return ADMIN_UIDS.includes(u.uid);
  }

  // ─── Page Navigation ──────────────────────────────────
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─── Admin Users ──────────────────────────────────────
  let _allAdminUsers = [];

  async function loadAdminUsers() {
    if (!isAdminUser()) return;
    const container = document.getElementById('adminUsersContainer');
    container.innerHTML = '<div class="admin-loading">⏳ جاري التحميل...</div>';
    try {
      const snap = await window._fbGetDocs(window._fbCollection(window._fbDb, 'users'));
      _allAdminUsers = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
      renderAdminUsers(_allAdminUsers);
      updateAdminStats(_allAdminUsers);
    } catch(e) {
      container.innerHTML = '<div class="admin-empty"><span>❌</span>خطأ في تحميل البيانات</div>';
      console.error('loadAdminUsers:', e);
    }
  }

  function updateAdminStats(users) {
    const premium = users.filter(u => u.premium);
    document.getElementById('admin-total-count').textContent = users.length;
    document.getElementById('admin-premium-count').textContent = premium.length;
    document.getElementById('admin-free-count').textContent = users.length - premium.length;
  }

  function filterAdminUsers(q) {
    const filtered = q.trim()
      ? _allAdminUsers.filter(u =>
          (u.email || '').toLowerCase().includes(q.toLowerCase()) ||
          (u.name  || '').toLowerCase().includes(q.toLowerCase()))
      : _allAdminUsers;
    renderAdminUsers(filtered);
  }

  function getInitialsFromEmail(email) {
    if (!email) return '?';
    const parts = email.split('@')[0].split(/[\._\-]/);
    if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
    return email.slice(0, 2).toUpperCase();
  }

  function renderAdminUsers(users) {
    const container = document.getElementById('adminUsersContainer');
    if (users.length === 0) {
      container.innerHTML = '<div class="admin-empty"><span>🔍</span>لا توجد نتائج</div>';
      return;
    }
    const rows = users.map(u => {
      const initials = getInitialsFromEmail(u.email || u.name || '?');
      const badgeHtml = u.premium
        ? '<span class="premium-badge-admin">👑 Premium</span>'
        : '<span class="free-badge-admin">مجاني</span>';
      const btnHtml = u.premium
        ? `<button class="toggle-premium-btn make-free" onclick="toggleUserPremium('${u.uid}', false)">إلغاء Premium</button>`
        : `<button class="toggle-premium-btn" onclick="toggleUserPremium('${u.uid}', true)">منح Premium 👑</button>`;
      return `
        <tr>
          <td>
            <div class="user-email-cell">
              <div class="user-avatar">${initials}</div>
              <div>
                <div style="font-size:0.88rem;color:rgba(255,255,255,0.9);">${u.email || '—'}</div>
                ${u.name ? `<div style="font-size:0.75rem;color:var(--text-muted);">${u.name}</div>` : ''}
              </div>
            </div>
          </td>
          <td>${badgeHtml}</td>
          <td>${btnHtml}</td>
        </tr>`;
    }).join('');

    container.innerHTML = `
      <table class="users-table">
        <thead>
          <tr>
            <th>المستخدم</th>
            <th>الحالة</th>
            <th>إجراء</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function toggleUserPremium(uid, makePremium) {
    try {
      await window._fbSetDoc(
        window._fbDoc(window._fbDb, 'users', uid),
        { premium: makePremium },
        { merge: true }
      );
      const user = _allAdminUsers.find(u => u.uid === uid);
      if (user) user.premium = makePremium;
      const q = document.getElementById('adminSearchInput')?.value || '';
      renderAdminUsers(q.trim()
        ? _allAdminUsers.filter(u => (u.email || '').toLowerCase().includes(q.toLowerCase()))
        : _allAdminUsers);
      updateAdminStats(_allAdminUsers);
      showAdminToast(makePremium ? '👑 تم منح Premium بنجاح' : '✅ تم إلغاء Premium');
    } catch(e) {
      console.error('toggleUserPremium:', e);
      showAdminToast('❌ حدث خطأ، حاول مجدداً');
    }
  }

  let adminToastTimer = null;
  function showAdminToast(msg) {
    const toast = document.getElementById('adminToast');
    const msgEl = document.getElementById('adminToastMsg');
    if (!toast || !msgEl) return;
    msgEl.textContent = msg;
    toast.classList.add('show');
    clearTimeout(adminToastTimer);
    adminToastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function showAdminPage(user) {
    showPage('adminPage');
    if (isAdminUser(user)) {
      document.getElementById('adminContent').style.display = 'block';
      document.getElementById('adminAccessDenied').style.display = 'none';
      loadAdminUsers();
    } else {
      document.getElementById('adminContent').style.display = 'none';
      document.getElementById('adminAccessDenied').style.display = 'block';
    }
  }

  // ─── Auth UI ──────────────────────────────────────────
  function showAuthError(msg) {
    const el = document.getElementById('authError');
    if (el) el.textContent = msg;
  }

  function setLoginBtnLoading(loading) {
    const btn = document.getElementById('loginBtn');
    if (!btn) return;
    btn.disabled = loading;
    btn.textContent = loading ? '⏳ جاري...' : 'تسجيل الدخول';
  }

  function initAuthUI() {
    const AUTH_ERRORS = {
      'auth/user-not-found':     'البريد الإلكتروني غير مسجّل',
      'auth/wrong-password':     'كلمة المرور غير صحيحة',
      'auth/invalid-credential': 'البريد أو كلمة المرور غير صحيحة',
      'auth/invalid-email':      'البريد الإلكتروني غير صالح',
      'auth/too-many-requests':  'محاولات كثيرة، حاول لاحقاً',
    };

    const loginBtn  = document.getElementById('loginBtn');
    const emailIn   = document.getElementById('emailInput');
    const passIn    = document.getElementById('passwordInput');
    const googleBtn = document.getElementById('googleLoginBtn');

    const doLogin = async () => {
      const email = emailIn.value.trim();
      const pass  = passIn.value;
      if (!email || !pass) { showAuthError('يرجى إدخال البريد وكلمة المرور'); return; }
      setLoginBtnLoading(true);
      try {
        await window._fbSignIn(window._fbAuth, email, pass);
      } catch(e) {
        showAuthError(AUTH_ERRORS[e.code] || 'حدث خطأ، حاول مجدداً');
        setLoginBtnLoading(false);
      }
    };
    if (loginBtn) loginBtn.addEventListener('click', doLogin);
    if (passIn)   passIn.addEventListener('keydown',  e => { if (e.key === 'Enter') doLogin(); });
    if (emailIn)  emailIn.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    if (googleBtn) googleBtn.addEventListener('click', async () => {
      googleBtn.disabled = true;
      try {
        await window._fbGoogleIn(window._fbAuth, window._fbProvider);
      } catch(e) {
        if (e.code !== 'auth/popup-closed-by-user') showAuthError('فشل تسجيل الدخول بـ Google');
        googleBtn.disabled = false;
      }
    });
  }

  // ─── On Login / Logout ────────────────────────────────
  async function onUserLoggedIn(user) {
    const loading = document.getElementById('authLoadingScreen');
    if (loading) loading.style.display = 'none';
    showAdminPage(user);
  }

  function onUserLoggedOut() {
    const loading = document.getElementById('authLoadingScreen');
    if (loading) loading.style.display = 'none';
    showPage('loginPage');
  }

  function fbLogout() {
    if (window._fbAuth) window._fbSignOut(window._fbAuth);
  }

  // ─── Start App ────────────────────────────────────────
  function startApp() {
    if (!window._firebaseReady || !window._fbAuth) {
      document.addEventListener('firebase-ready', startApp, { once: true });
      return;
    }
    initAuthUI();
    let _firstFire = true;
    window._fbOnAuth(window._fbAuth, async (user) => {
      if (_firstFire) {
        _firstFire = false;
        const loading = document.getElementById('authLoadingScreen');
        if (user) {
          await onUserLoggedIn(user);
        } else {
          if (loading) loading.style.display = 'none';
          showPage('loginPage');
        }
      } else {
        if (user) { await onUserLoggedIn(user); }
        else       { onUserLoggedOut(); }
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', startApp);
  } else {
    setTimeout(startApp, 0);
  }

  // ─── Expose to window ────────────────────────────────
  window.fbLogout          = fbLogout;
  window.showAdminPage     = showAdminPage;
  window.loadAdminUsers    = loadAdminUsers;
  window.filterAdminUsers  = filterAdminUsers;
  window.toggleUserPremium = toggleUserPremium;
</script>
</body>
</html>
